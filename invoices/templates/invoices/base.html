<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atul Industries — PI Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;font-size:14px;color:#1e293b;line-height:1.5}

/* ─── CSS VARIABLES ─── */
:root{
  --navy:#0f2c5e;--gold:#f0c040;
  --blue:#1a56db;--blue2:#1340b0;--bluel:#eff6ff;
  --green:#16a34a;--greenl:#dcfce7;
  --red:#dc2626;--redl:#fee2e2;
  --amber:#d97706;--amberl:#fef3c7;
  --purple:#7c3aed;--purplel:#f5f3ff;
  --gray50:#f9fafb;--gray100:#f3f4f6;--gray200:#e5e7eb;
  --gray300:#d1d5db;--gray400:#9ca3af;--gray500:#6b7280;
  --gray600:#4b5563;--gray700:#374151;--gray800:#1f2937;--gray900:#111827;
  --bg:#fff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --r:8px;--rl:12px;--rxl:16px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.09);
}

/* ─── LAYOUT ─── */
.app{display:flex;height:100vh;overflow:hidden}

/* ─── SIDEBAR ─── */
.sb{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-logo{padding:13px 14px 11px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:9px;cursor:pointer}
.sb-logo img{height:30px;object-fit:contain}
.sb-logo-txt{color:#fff;font-size:13px;font-weight:700;display:none}
.sb-logo img[data-err]{display:none}
.sb-logo img[data-err] + .sb-logo-txt{display:block}
.sb-sec{padding:10px 14px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;border:1px solid transparent;margin-bottom:1px;transition:all .15s;user-select:none}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.on{background:var(--blue);color:#fff}
.sb-av{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;letter-spacing:.02em}
.sb-item.on .sb-av{background:rgba(255,255,255,.22)}
.sb-info{min-width:0;flex:1}
.sb-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-cnt{font-size:10px;opacity:.5;margin-top:1px}
.sb-bottom{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:3px}
.sb-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;transition:all .15s;border:1px dashed rgba(255,255,255,.15);background:transparent;width:100%;font-family:inherit}
.sb-btn:hover{color:#fff;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.05)}
.sb-btn.hi{border-style:solid;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg3);min-width:0}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh)}
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);min-width:0;overflow:hidden}
.bc-a{cursor:pointer;color:var(--text2);white-space:nowrap;transition:color .15s;flex-shrink:0}.bc-a:hover{color:var(--blue)}
.bc-cur{color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-sep{color:var(--text3);font-size:10px;flex-shrink:0}
.tba{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tabs{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;display:flex;flex-shrink:0}
.tab{padding:11px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-weight:400;transition:all .15s;display:flex;align-items:center;gap:6px;user-select:none}
.tab:hover{color:var(--text)}.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:var(--gray100);color:var(--text2)}
.tab.on .badge{background:var(--bluel);color:var(--blue)}
.scroll{flex:1;overflow-y:auto;padding:18px}
.scroll::-webkit-scrollbar{width:5px}.scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:var(--bg);color:var(--text);transition:all .15s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--gray50);border-color:var(--gray300)}.btn:active{transform:scale(.98)}
.btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.bp{background:var(--blue);color:#fff;border-color:var(--blue)}.bp:hover{background:var(--blue2);border-color:var(--blue2)}
.bg{background:var(--green);color:#fff;border-color:var(--green)}.bg:hover{background:#15803d}
.br{background:transparent;color:var(--red);border-color:var(--red)}.br:hover{background:var(--redl)}
.bgh{background:transparent;border-color:transparent;color:var(--text2)}.bgh:hover{background:var(--gray100);color:var(--text)}
.ibt{padding:5px 7px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);display:inline-flex;align-items:center;font-size:13px;line-height:1;transition:all .15s}
.ibt:hover{background:var(--gray100);color:var(--text);border-color:var(--gray300)}

/* ─── CARD ─── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh)}
.ch{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ct{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.cb{padding:14px 16px}

/* ─── FORMS ─── */
.fg{margin-bottom:11px}
.fl{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fl.req::after{content:' *';color:var(--red)}
.fc{width:100%;border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;color:var(--text);background:var(--bg);font-family:inherit;transition:border .15s,box-shadow .15s;outline:none}
.fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fc:disabled{background:var(--gray50);color:var(--text2);cursor:not-allowed}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
select.fc{cursor:pointer;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:right 8px center;background-repeat:no-repeat;background-size:16px;padding-right:28px;-webkit-appearance:none;appearance:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ─── KPI ─── */
.krow{display:grid;gap:11px;margin-bottom:16px}
.krow-4{grid-template-columns:repeat(4,1fr)}
.krow-3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--sh)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* ─── PARTY GRID ─── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.pcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:15px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.pcard:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(26,86,219,.12);transform:translateY(-1px)}
.pav{width:38px;height:38px;border-radius:9px;background:var(--bluel);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-bottom:9px;letter-spacing:.02em}
.pname{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmeta{font-size:11px;color:var(--text3);line-height:1.7}
.pfoot{margin-top:9px;padding-top:9px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pacts{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.pcard:hover .pacts{opacity:1}

/* ─── PF LIST ─── */
.pfl{display:flex;flex-direction:column;gap:8px}
.pfrow{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:12px 15px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);transition:border-color .15s}
.pfrow:hover{border-color:var(--border2)}
.pfnum{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--blue)}
.pfdate{font-size:11px;color:var(--text3);margin-top:1px}
.pfamt{font-size:14px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.pfgst{font-size:10px;color:var(--text3)}
.pfacts{display:flex;gap:5px;flex-shrink:0;margin-left:auto}

/* ─── DISCOUNT BAR ─── */
.dbar{background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--rl);padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.dlbl{font-size:13px;font-weight:600;color:#1e40af;white-space:nowrap}
.dinp{width:76px;border:1.5px solid #93c5fd;border-radius:var(--r);padding:5px 8px;font-size:16px;font-weight:700;color:#1e40af;background:#fff;text-align:center;font-family:'JetBrains Mono',monospace;outline:none}
.dinp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,219,.12)}

/* ─── ITEMS TABLE ─── */
.itw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border)}
.itbl{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
.itbl th{background:var(--gray50);padding:8px 9px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
.itbl td{padding:6px 9px;border-bottom:1px solid var(--gray100);vertical-align:middle}
.itbl tbody tr:last-child td{border-bottom:none}
.itbl tbody tr:hover td{background:#f0f7ff}
.ifc{border:1px solid var(--border2);border-radius:6px;padding:4px 7px;font-size:12px;width:100%;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border .15s}
.ifc:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,219,.1)}
select.ifc{cursor:pointer;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:right 6px center;background-repeat:no-repeat;background-size:14px;padding-right:22px;-webkit-appearance:none;appearance:none}
.nr-a{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--blue)}
.nr-m{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--green)}
.delbtn{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px 5px;border-radius:4px;font-size:13px;line-height:1;transition:all .15s}
.delbtn:hover{color:var(--red);background:var(--redl)}

/* ─── TOTALS ─── */
.tpanel{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-top:10px;box-shadow:var(--sh)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--gray100)}
.trow:last-child{border:none}
.tlbl{font-size:12px;color:var(--text2)}
.tval{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text)}
.tgrand{background:var(--gray900)}
.tgrand .tlbl,.tgrand .tval{color:#fff;font-weight:700;font-size:13px}

/* ─── SETTINGS ─── */
.stwrap{display:grid;grid-template-columns:175px 1fr;background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.stnav{border-right:1px solid var(--border);padding:8px}
.stni{padding:8px 11px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:2px;user-select:none}
.stni:hover{background:var(--gray50)}.stni.on{background:var(--bluel);color:var(--blue);font-weight:500}
.stpanel{padding:18px;overflow-y:auto;max-height:calc(100vh - 120px)}

/* ─── MODAL ─── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg);border-radius:var(--rxl);box-shadow:0 20px 60px rgba(0,0,0,.18);width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-w{max-width:560px}
.mh{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mh h3{font-size:15px;font-weight:600}
.mcls{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:0 4px;line-height:1;border-radius:4px}
.mcls:hover{background:var(--gray100);color:var(--text)}
.mbody{padding:18px;overflow-y:auto;flex:1}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:44px 20px}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
.et{font-size:15px;font-weight:600;margin-bottom:5px}
.es{font-size:13px;color:var(--text3);margin-bottom:16px}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--gray900);color:#fff;padding:10px 16px;border-radius:var(--rl);font-size:13px;z-index:9999;opacity:0;transform:translateY(6px);transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.18);pointer-events:none;max-width:320px}
.toast.on{opacity:1;transform:translateY(0)}
.tok{background:#15803d}.terr{background:var(--red)}.tinf{background:#0369a1}

/* ─── MISC ─── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.pill-g{background:var(--greenl);color:var(--green)}
.pill-r{background:var(--redl);color:var(--red)}
.pill-b{background:var(--bluel);color:var(--blue)}
.pill-a{background:var(--amberl);color:var(--amber)}
.pill-p{background:var(--purplel);color:var(--purple)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sb no-print">
    <div class="sb-logo" onclick="goDash()">
      <img src="https://www.atulpipes.in/images/logo.png" alt="Atul"
        onerror="this.setAttribute('data-err','1');this.nextElementSibling.style.display='block'">

    <div class="sb-sec">Sales Team</div>
    <div class="sb-list" id="sbList"></div>
    <div class="sb-bottom">
      <button class="sb-btn" id="sbDash" onclick="goDash()">📊 &nbsp;Dashboard</button>
      <button class="sb-btn" onclick="openAddSP()">＋ &nbsp;Add Salesperson</button>
      <button class="sb-btn" onclick="goSettings()">⚙ &nbsp;Settings</button>
    </div>
  </div>
  <!-- MAIN -->
  <div class="main">
    <div class="topbar no-print">
      <div class="bc" id="bc"></div>
      <div class="tba" id="tba"></div>
    </div>
    <div class="tabs no-print" id="tabBar" style="display:none"></div>
    <div class="scroll" id="content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

// Helper to get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function ini(n){return String(n).split(' ').filter(Boolean).map(w=>w[0].toUpperCase()).slice(0,2).join('');}
function sf(v){const n=parseFloat(v);return isNaN(n)?0:n;}
function fmt(n){return sf(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtL(n){return (sf(n)/100000).toFixed(2)+'L';}
function today(){return new Date().toISOString().split('T')[0];}
function fmtD(d){if(!d)return'';const p=String(d).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isPipe(n){return Boolean(n&&n.toLowerCase().includes('conduit pipe'));}
function bSize(n){
  if(!n)return 0;
  if(co.pipePacking&&co.pipePacking[n])return sf(co.pipePacking[n]);
  if(n.includes('25mm'))return 30;
  if(n.includes('20mm'))return 40;
  return 0;
}
function packNarr(name,qty,unit){
  const bs=bSize(name);qty=sf(qty);
  if(!bs||!qty)return'';
  if(unit==='Mtr'){const b=qty/bs;return qty+'m = '+(b===Math.floor(b)?b:b.toFixed(2))+'Bdl';}
  if(unit==='Bundle'||unit==='Bndl'){return qty+'Bdl = '+(qty*bs)+'m';}
  return'';
}
function genPINum(){
  const all=db.proformas.filter(p=>{const pa=db.parties.find(x=>x.id===p.partyId);return pa&&pa.spId===ST.sp.id;});
  const d=new Date();
  return 'PI-'+ini(ST.sp.name)+'-'+String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+'-'+String(all.length+1).padStart(3,'0');
}

// Amount in words
function n2w(n){
  n=Math.round(sf(n)*100)/100;
  const ip=Math.floor(n), dp=Math.round((n-ip)*100);
  const O=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const T=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function w(x){
    if(!x)return'';if(x<20)return O[x]+' ';if(x<100)return T[Math.floor(x/10)]+(x%10?' '+O[x%10]:'')+' ';
    if(x<1000)return O[Math.floor(x/100)]+' Hundred '+(x%100?w(x%100):'');
    if(x<100000)return w(Math.floor(x/1000))+'Thousand '+(x%1000?w(x%1000):'');
    if(x<10000000)return w(Math.floor(x/100000))+'Lakh '+(x%100000?w(x%100000):'');
    return w(Math.floor(x/10000000))+'Crore '+(x%10000000?w(x%10000000):'');
  }
  let r='Rupees '+(w(ip).trim()||'Zero');
  if(dp>0)r+=' and Paise '+w(dp).trim();
  return r.trim();
}

═══════════════════════════════════════════ */
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast on'+(type==='err'?' terr':type==='inf'?' tinf':' tok');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('on'),2800);
}

function R(){
  renderSB();
  const bc=document.getElementById('bc');
  const tba=document.getElementById('tba');
  const tabs=document.getElementById('tabBar');
  const content=document.getElementById('content');
  tabs.style.display='none';
  tba.innerHTML='';

  if(ST.view==='settings'){rSettings(bc,tba,content);return;}
  if(ST.view==='dashboard'||!ST.sp){rDashboard(bc,tba,content);return;}
  if(ST.view==='form'){rForm(bc,tba,content);return;}

  // Show tabs for SP views
  tabs.style.display='flex';
  const spPFs=db.proformas.filter(pf=>{const p=db.parties.find(x=>x.id===pf.partyId);return p&&p.spId===ST.sp.id;});
  tabs.innerHTML=
    '<div class="tab '+(ST.tab==='parties'?'on':'')+'" onclick="ST.tab=\'parties\';ST.view=\'parties\';ST.party=null;R()">Parties <span class="badge">'+db.parties.filter(p=>p.spId===ST.sp.id).length+'</span></div>'+

  if(ST.view==='allPFs'){rAllPFs(bc,tba,content);return;}
  rParties(bc,tba,content);
}

function renderSB(){
  const el=document.getElementById('sbList');
  document.getElementById('sbDash').classList.toggle('hi',ST.view==='dashboard');
  if(!db.sp.length){el.innerHTML='<div style="padding:10px 12px;font-size:11px;color:rgba(255,255,255,.3);text-align:center">No salespersons yet</div>';return;}
  el.innerHTML=db.sp.map(sp=>{

      '<div class="pfacts">'+
        '<button class="btn btn-sm" onclick="clonePF(\''+pf.id+'\')">Copy</button>'+

        '<button class="btn btn-sm br" onclick="delPF(\''+pf.id+'\')">Del</button>'+

let _psd={date:-1,amt:-1};
function filterAllPFs(q){
  q=q.toLowerCase();
  document.querySelectorAll('#allPFList .pfrow').forEach(r=>{
    r.style.display=(r.dataset.num.includes(q)||r.dataset.party.includes(q))?'':'none';
  });
}
function sortAllPFs(by){
  _psd[by]*=-1;
  const list=document.getElementById('allPFList');
  if(!list)return;
  [...list.querySelectorAll('.pfrow')].sort((a,b)=>{
    return by==='date'?(a.dataset.date>b.dataset.date?1:-1)*_psd[by]:(sf(a.dataset.amt)-sf(b.dataset.amt))*_psd[by];
  }).forEach(r=>list.appendChild(r));
}

function newPF(){ST.view='form';ST.editId=null;ST.cloneId=null;ST.fItems=[mkRow()];ST.fDisc=0;ST.showDisc=false;R();}
function mkRow(src){return Object.assign({id:uid(),itemName:'',unit:'Pcs',qty:1,rate:'',disc:'',manualNet:''},src||{});}
function clonePF(id){
  const pf=db.proformas.find(p=>p.id===id);if(!pf)return;
  if(pf.partyId&&!ST.party)ST.party=db.parties.find(p=>p.id===pf.partyId);
  ST.view='form';ST.editId=null;ST.cloneId=id;
  ST.fItems=pf.items.map(i=>mkRow(i));

function previewPF(){
  const data=collectPF();
  if(!data.number.trim()){toast('PI number required','err');return;}
  if(!data.items.some(i=>i.itemName)){toast('At least one item add karo','err');return;}
  // Temporary save for preview
  let tmpId='_preview_tmp';
  const existing=db.proformas.findIndex(p=>p.id===tmpId);
  const tmp=Object.assign({id:tmpId},data);
  if(existing>=0)db.proformas[existing]=tmp;else db.proformas.push(tmp);
  saveDB();
  exportPDF(tmpId,true);

  setTimeout(()=>{db.proformas=db.proformas.filter(p=>p.id!==tmpId);saveDB();},5000);
}

function renderRateComp(){
  const rcp=document.getElementById('rateComp');if(!rcp)return;
  const prev=db.proformas.filter(p=>p.partyId===ST.party?.id&&p.id!==ST.editId);
  const ref=prev.length?prev[prev.length-1]:(ST.cloneId?db.proformas.find(p=>p.id===ST.cloneId):null);
  if(!ref){rcp.innerHTML='';return;}
  const rm={};ref.items.forEach(i=>{if(i.itemName)rm[i.itemName]=sf(i.netRate);});
  const disc=ST.fDisc||0;
  const rows=ST.fItems.filter(i=>i.itemName&&rm[i.itemName]!==undefined).map(item=>{
    const lr=sf(item.rate);
    const id=item.disc!==''&&item.disc!==undefined?sf(item.disc):disc;
    const cur=item.manualNet?sf(item.manualNet):lr*(1-id/100);
    const prev2=rm[item.itemName];
    const diff=cur-prev2;
    if(Math.abs(diff)<0.001)return'';
    const up=diff>0;
    const pct=prev2>0?Math.abs(diff/prev2*100).toFixed(1):0;
    return '<div style="padding:5px 0;border-bottom:1px solid var(--gray100)">'+
      '<div style="font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.itemName.replace('PVC ',''))+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">'+
        '<span style="font-size:10px;color:var(--text2);font-family:monospace">₹'+prev2.toFixed(2)+'→₹'+cur.toFixed(2)+'</span>'+
        '<span class="pill '+(up?'pill-r':'pill-g')+'">'+(up?'▲':'▼')+pct+'%</span>'+
      '</div></div>';
  }).filter(Boolean).join('');

  if(!rows){rcp.innerHTML='<div class="card"><div class="cb" style="font-size:12px;color:var(--text3);padding:10px 14px">📊 vs '+esc(ref.number)+': No changes</div></div>';return;}
  rcp.innerHTML=
    '<div class="card">'+
      '<div class="ch" style="padding:9px 14px"><div class="ct" style="font-size:12px">📊 vs '+esc(ref.number)+'</div><span style="font-size:10px;color:var(--text3)">'+fmtD(ref.date)+'</span></div>'+
      '<div style="padding:6px 14px;max-height:190px;overflow-y:auto">'+rows+'</div>'+
      '<div style="padding:6px 14px;background:var(--gray50);border-top:1px solid var(--border);font-size:10px;color:var(--text3)">Prev disc: '+sf(ref.discount)+'% → Now: '+disc+'%</div>'+
    '</div>';
}

/* ─── COLLECT & SAVE PF ─── */
function collectPF(){
  const disc=sf(document.getElementById('F_disc')?.value||0);
  let sub=0;
  const items=ST.fItems.map(item=>{
    const lr=sf(item.rate);
    const iDisc=item.disc!==''&&item.disc!==undefined?sf(item.disc):disc;
    const nr=item.manualNet?sf(item.manualNet):Math.round(lr*(1-iDisc/100)*100)/100;
    const qty=sf(item.qty);
    const amt=Math.round(nr*qty*100)/100;
    sub+=amt;
    return Object.assign({},item,{listRate:lr,netRate:nr,itemDisc:iDisc,amount:amt,narration:isPipe(item.itemName)?packNarr(item.itemName,qty,item.unit):''});
  });
  const gst=Math.round(sub*18)/100;
  const freight=parseFloat(document.getElementById('F_freight')?.value||0)||0;
  const grand=Math.round((sub+gst+freight)*100)/100;
  sub=Math.round(sub*100)/100;
  const stOn=document.getElementById('F_ston');
  let shipTo=null;
  if(stOn&&stOn.checked){
    const g=id=>document.getElementById(id)?.value||'';
    shipTo={name:g('F_stn'),gstin:g('F_stg').toUpperCase(),address:g('F_sta'),city:g('F_stc'),state:g('F_sts'),pin:g('F_stp'),phone:g('F_stph')};
  }
  return{
    number:document.getElementById('F_num')?.value||'',
    date:document.getElementById('F_date')?.value||'',
    validTill:document.getElementById('F_vt')?.value||'',
    subject:document.getElementById('F_subj')?.value||'',
    notes:document.getElementById('F_notes')?.value||'',
    discount:disc,showDiscInPDF:document.getElementById('F_sdisc')?.checked||false,
    freight:freight,
    items,shipTo,subtotal:sub,gstAmt:gst,grandTotal:grand,
    partyId:ST.party.id,spId:ST.sp.id
  };
}

function savePF(andPDF){
  const data=collectPF();
  if(!data.number.trim()){toast('PI number required','err');return;}
  if(!data.items.some(i=>i.itemName)){toast('At least one item add karo','err');return;}
  const dup=db.proformas.find(p=>p.number===data.number&&p.id!==ST.editId);
  if(dup&&!confirm('PI number "'+data.number+'" already exists. Phir bhi save karein?'))return;
  let pfId;
  if(ST.editId){
    const idx=db.proformas.findIndex(p=>p.id===ST.editId);
    if(idx>=0){pfId=ST.editId;db.proformas[idx]=Object.assign({},db.proformas[idx],data);}
  }else{pfId=uid();db.proformas.push(Object.assign({id:pfId},data));}
  saveDB();
  toast(andPDF?'Saved! PDF generating...':'Proforma saved!');
  if(andPDF)setTimeout(()=>exportPDF(pfId),300);
  backToPFs();
}

      '<div style="border:1px solid var(--border);border-radius:var(--rl);overflow:hidden">'+
      '<table style="width:100%;border-collapse:collapse;font-size:12px">'+
        '<thead><tr style="background:var(--gray50)"><th style="padding:7px 12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);text-align:left">Pipe Item</th><th style="padding:7px 12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);text-align:right;width:160px">Mtr per Bundle</th></tr></thead>'+
        '<tbody>'+ITEMS.filter(isPipe).map(item=>{
          const k='pk_'+item.replace(/[\s().]/g,'_');
          const v=(co.pipePacking&&co.pipePacking[item])||( item.includes('25mm')?30:item.includes('20mm')?40:'');
          return '<tr style="border-bottom:1px solid var(--gray100)"><td style="padding:5px 12px">'+esc(item)+'</td><td style="padding:3px 10px"><input type="number" id="'+k+'" class="fc" value="'+v+'" min="1" step="0.5" style="text-align:right;font-family:monospace"></td></tr>';
        }).join('')+
        '</tbody></table></div>'+
      '<button class="btn bp" style="margin-top:12px" onclick="savePacking()">Save Packing</button>'+
      '<div style="margin-top:8px;font-size:11px;color:var(--text3)">Default: 25mm=30m/Bdl · 20mm=40m/Bdl</div>';

  }else if(t==='terms'){
    el.innerHTML=
      '<p style="font-size:13px;color:var(--text2);margin-bottom:10px">Har nayi PI mein automatically load hongi</p>'+
      '<div class="fg"><textarea id="dt_terms" class="fc" rows="10" style="font-size:12px;line-height:1.7">'+esc(co.defaultTerms||'')+'</textarea></div>'+
      '<button class="btn bp" onclick="saveTerms()">Save Terms</button>';

  }else if(t==='data'){
    el.innerHTML=
      '<div style="display:flex;flex-direction:column;gap:12px">'+
        '<div class="card"><div class="cb"><div style="font-size:14px;font-weight:600;margin-bottom:6px">📥 Export Backup</div><div style="font-size:13px;color:var(--text2);margin-bottom:10px">Saara data JSON mein download karo</div><button class="btn bp" onclick="expBackup()">Export</button></div></div>'+
        '<div class="card"><div class="cb"><div style="font-size:14px;font-weight:600;margin-bottom:6px">📂 Import Backup</div><div style="font-size:13px;color:var(--text2);margin-bottom:10px">Pehle backup se restore karo</div><label class="btn bp" style="cursor:pointer">Import<input type="file" accept=".json" style="display:none" onchange="impBackup(this)"></label></div></div>'+
        '<div class="card" style="border-color:var(--red)"><div class="cb"><div style="font-size:14px;font-weight:600;color:var(--red);margin-bottom:6px">⚠ Reset to Seed Data</div><div style="font-size:13px;color:var(--text2);margin-bottom:10px">Alok Singh ka original data wapas load karo (current data delete hoga)</div><button class="btn br" onclick="resetToSeed()">Reset</button></div></div>'+
        '<div class="card" style="border-color:var(--red)"><div class="cb"><div style="font-size:14px;font-weight:600;color:var(--red);margin-bottom:6px">🗑 Clear All Data</div><div style="font-size:13px;color:var(--text2);margin-bottom:10px">Sab permanently delete (undo nahi hoga)</div><button class="btn br" onclick="clearAll()">Clear All</button></div></div>'+
      '</div>';
  }

  // Update nav highlight
  document.querySelectorAll('.stni').forEach((el2,i)=>{
    el2.classList.toggle('on',['company','bank','prices','packing','terms','data'][i]===t);
  });
}

function fg(label,id,val,req,cls){
  return '<div class="fg"><label class="fl'+(req?' req':'')+'">'+label+'</label><input id="'+id+'" class="fc'+(cls?' '+cls:'')+'" value="'+esc(val||'')+'"></div>';
}

/* ─── SETTINGS SAVE ─── */
function saveCo2(){co.name=v('co_name');co.gstin=v('co_gstin');co.address=v('co_addr');co.city=v('co_city');co.state=v('co_state');co.pin=v('co_pin');co.phone=v('co_phone');co.email=v('co_email');saveCo();toast('Company saved!');}
function saveBank(){co.bank=v('co_bank');co.account=v('co_acct');co.ifsc=v('co_ifsc');co.branch=v('co_branch');saveCo();toast('Bank saved!');}
function savePrices(){ITEMS.forEach(item=>{const k='pl_'+item.replace(/[\s().]/g,'_');const el=document.getElementById(k);if(el){const val=sf(el.value);if(val>0)pl[item]=val;else delete pl[item];}});savePL();toast('Prices saved!');}
function savePacking(){if(!co.pipePacking)co.pipePacking={};ITEMS.filter(isPipe).forEach(item=>{const k='pk_'+item.replace(/[\s().]/g,'_');const el=document.getElementById(k);if(el){const val=sf(el.value);if(val>0)co.pipePacking[item]=val;else delete co.pipePacking[item];}});saveCo();toast('Packing saved!');}
function saveTerms(){const el=document.getElementById('dt_terms');if(el){co.defaultTerms=el.value;saveCo();toast('Terms saved!');}}
function impCSV(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{let cnt=0;e.target.result.split('\n').forEach(l=>{const p=l.split(',');if(p.length>=2){const val=sf(p[1].trim());if(p[0].trim()&&val>0){pl[p[0].trim()]=val;cnt++;}}});savePL();toast(cnt+' prices imported!');rStTab();};r.readAsText(f);}
function expBackup(){const d={db,co,pl};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pim-backup-'+today()+'.json';a.click();toast('Exported!');}
function impBackup(inp){const f=inp.files[0];if(!f)return;if(!confirm('Existing data replace ho jaayega. Continue?'))return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.db){db=d.db;saveDB();}if(d.co){co=Object.assign({},DEFAULT_CO,d.co);saveCo();}if(d.pl){pl=d.pl;savePL();}toast('Imported!');R();}catch(err){toast('Invalid file','err');}};r.readAsText(f);}
function resetToSeed(){if(!confirm('Reset to Alok Singh original data?'))return;db={sp:SEED.sp,parties:SEED.parties,proformas:SEED.proformas};saveDB();toast('Reset to seed data!');R();}
function clearAll(){if(!confirm('Sab data delete hoga!'))return;if(!confirm('100% sure?'))return;db={sp:[],parties:[],proformas:[]};saveDB();Object.assign(ST,{view:'dashboard',sp:null,party:null,editId:null,cloneId:null,fItems:[],fDisc:0,showDisc:false});toast('Cleared','err');R();}
function v(id){return document.getElementById(id)?.value||'';}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
function modal(title,bodyHtml,onOk,okLbl,wide){
  closeModal();
  const ov=document.createElement('div');ov.className='ov';ov.id='_ov';
  ov.innerHTML=
    '<div class="modal'+(wide?' modal-w':'')+'" onclick="event.stopPropagation()">'+
      '<div class="mh"><h3>'+esc(title)+'</h3><button class="mcls" onclick="closeModal()">✕</button></div>'+
      '<div class="mbody">'+bodyHtml+'</div>'+
      '<div class="mfoot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn bp" id="_mok">'+esc(okLbl||'Save')+'</button></div>'+
    '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',closeModal);
  document.getElementById('_mok').onclick=onOk;
  setTimeout(()=>ov.querySelector('input')?.focus(),50);
}
function closeModal(){const m=document.getElementById('_ov');if(m)m.remove();}

/* ═══════════════════════════════════════════
   SP CRUD
═══════════════════════════════════════════ */
function openAddSP(){
  modal('Add Salesperson',
    '<div class="fg"><label class="fl req">Full Name</label><input id="M_spn" class="fc" placeholder="e.g. Ramesh Kumar"></div>'+
    '<div class="fg"><label class="fl">Phone</label><input id="M_spp" class="fc" placeholder="Mobile number"></div>'+
    '<div class="fg"><label class="fl">Email</label><input id="M_spe" class="fc" placeholder="Email address"></div>',
    ()=>{
      const n=v('M_spn').trim();if(!n){toast('Name required','err');return;}
      db.sp.push({id:uid(),name:n,phone:v('M_spp'),email:v('M_spe')});
      saveDB();closeModal();toast('Salesperson added!');R();
    },'Add');
}
function openEditSP(id){
  const sp=db.sp.find(s=>s.id===id);if(!sp)return;
  modal('Edit: '+sp.name,
    '<div class="fg"><label class="fl req">Full Name</label><input id="M_spn" class="fc" value="'+esc(sp.name)+'"></div>'+
    '<div class="fg"><label class="fl">Phone</label><input id="M_spp" class="fc" value="'+esc(sp.phone||'')+'"></div>'+
    '<div class="fg"><label class="fl">Email</label><input id="M_spe" class="fc" value="'+esc(sp.email||'')+'"></div>',
    ()=>{
      const n=v('M_spn').trim();if(!n){toast('Name required','err');return;}
      sp.name=n;sp.phone=v('M_spp');sp.email=v('M_spe');
      if(ST.sp&&ST.sp.id===id)ST.sp=sp;
      saveDB();closeModal();toast('Updated!');R();
    },'Save');
}
function delSP(id){
  const sp=db.sp.find(s=>s.id===id);if(!sp)return;
  const pids=db.parties.filter(p=>p.spId===id).map(p=>p.id);
  const pc=db.proformas.filter(pf=>pids.includes(pf.partyId)).length;
  if(!confirm('Delete '+sp.name+'?\n'+pids.length+' parties aur '+pc+' PIs bhi delete ho jaayenge.'))return;
  db.proformas=db.proformas.filter(pf=>!pids.includes(pf.partyId));
  db.parties=db.parties.filter(p=>p.spId!==id);
  db.sp=db.sp.filter(s=>s.id!==id);
  saveDB();ST.sp=null;ST.view='dashboard';toast('Deleted','err');R();
}

/* ═══════════════════════════════════════════
   PARTY CRUD
═══════════════════════════════════════════ */
function partyForm(p){
  return '<div class="g2">'+
    '<div class="fg" style="grid-column:1/-1"><label class="fl req">Party / Firm Name</label><input id="M_pn" class="fc" value="'+esc(p?p.name||'':'')+'" placeholder="Firm name"></div>'+
    '<div class="fg"><label class="fl">Contact Person</label><input id="M_pc" class="fc" value="'+esc(p?p.contact||'':'')+'"></div>'+
    '<div class="fg"><label class="fl">Phone</label><input id="M_pph" class="fc" value="'+esc(p?p.phone||'':'')+'"></div>'+
    '<div class="fg" style="grid-column:1/-1"><label class="fl">Address</label><input id="M_pa" class="fc" value="'+esc(p?p.address||'':'')+'"></div>'+
    '<div class="fg"><label class="fl">City</label><input id="M_pci" class="fc" value="'+esc(p?p.city||'':'')+'"></div>'+
    '<div class="fg"><label class="fl">State</label><input id="M_pst" class="fc" value="'+esc(p?p.state||'Uttar Pradesh':'Uttar Pradesh')+'"></div>'+
    '<div class="fg"><label class="fl">PIN</label><input id="M_ppin" class="fc" value="'+esc(p?p.pin||'':'')+'"></div>'+
    '<div class="fg"><label class="fl">GSTIN</label>'+
      '<div style="display:flex;gap:6px">'+
        '<input id="M_pgstin" class="fc mono" style="flex:1" placeholder="15-digit GSTIN" value="'+esc(p?p.gstin||'':'')+'">'+
        '<button class="btn btn-sm" onclick="gstFillModal()" type="button">🔍</button>'+
      '</div>'+
    '</div>'+
    '<div class="fg" style="grid-column:1/-1"><label class="fl">Email</label><input id="M_pe" class="fc" value="'+esc(p?p.email||'':'')+'"></div>'+
  '</div>';
}
function gstFillModal(){
  const el=document.getElementById('M_pgstin');if(!el)return;
  const gstin=el.value.trim().toUpperCase();
  if(gstin.length!==15){toast('GSTIN 15 digits chahiye','err');return;}
  const sm={'01':'J&K','02':'HP','03':'Punjab','04':'Chandigarh','05':'Uttarakhand','06':'Haryana','07':'Delhi','08':'Rajasthan','09':'Uttar Pradesh','10':'Bihar','18':'Assam','19':'West Bengal','20':'Jharkhand','21':'Odisha','22':'CG','23':'MP','24':'Gujarat','27':'Maharashtra','29':'Karnataka','30':'Goa','32':'Kerala','33':'Tamil Nadu','36':'Telangana','37':'AP'};
  const state=sm[gstin.slice(0,2)]||'';
  const sel=document.getElementById('M_pst');if(sel&&state)sel.value=state;
  toast(state?'State: '+state+' auto-filled':'State code not found','inf');
}
function getPartyFormData(){
  return{name:v('M_pn').trim(),contact:v('M_pc'),phone:v('M_pph'),address:v('M_pa'),city:v('M_pci'),state:v('M_pst'),pin:v('M_ppin'),gstin:v('M_pgstin').toUpperCase(),email:v('M_pe')};
}
function openAddParty(){
  modal('Add Party',partyForm(null),()=>{
    const d=getPartyFormData();
    if(!d.name){toast('Party name required','err');return;}
    db.parties.push(Object.assign({id:uid(),spId:ST.sp.id},d));
    saveDB();closeModal();toast('Party added!');R();
  },'Add Party',true);
}
function openEditParty(id){
  const p=db.parties.find(x=>x.id===id);if(!p)return;
  modal('Edit: '+p.name,partyForm(p),()=>{
    const d=getPartyFormData();
    if(!d.name){toast('Party name required','err');return;}
    Object.assign(p,d);
    saveDB();closeModal();toast('Updated!');R();
  },'Save',true);
}
function delParty(id){
  const p=db.parties.find(x=>x.id===id);if(!p)return;
  const cnt=db.proformas.filter(pf=>pf.partyId===id).length;
  if(!confirm('Delete '+p.name+'?\n'+cnt+' PI(s) bhi delete ho jaayenge.'))return;
  db.proformas=db.proformas.filter(pf=>pf.partyId!==id);
  db.parties=db.parties.filter(x=>x.id!==id);
  saveDB();toast('Deleted','err');R();
}
function delPF(id){
  if(!confirm('This proforma delete ho jaayega?'))return;
  db.proformas=db.proformas.filter(p=>p.id!==id);
  saveDB();toast('Deleted','err');
  rPartyPFs(document.getElementById('bc'),document.getElementById('tba'),document.getElementById('content'));
}

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════ */
document.addEventListener('keydown',function(e){
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if(e.key==='Escape'){
    if(document.getElementById('_ov')){closeModal();return;}
    if(ST.view==='form'){backToPFs();return;}
    if(ST.view==='settings'){exitSettings();return;}
    if(ST.view==='partyPFs'){ST.tab='parties';ST.view='parties';ST.party=null;R();return;}
  }
  if(e.key==='n'&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
    if(ST.view==='partyPFs'&&ST.party){newPF();return;}
    if(ST.view==='parties'&&ST.sp){openAddParty();return;}
    if(ST.view==='dashboard'){openAddSP();return;}
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
R();
</script>
